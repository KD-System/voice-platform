# Мультиагентная конфигурация
#
# managing_agent — классификатор, анализирует запрос и возвращает JSON-инструкцию.
# agents — специализированные агенты, каждый со своим промптом и базой знаний.

managing_agent:
  name: "Главный диспетчер"
  model: ""                 # модель из config.json
  temperature: 0.1          # низкая — нужен детерминизм
  max_tokens: 60            # JSON-инструкция (~30-50 токенов)
  prompt: prompts/router.txt
  color: "#9E9E9E"

agents:
  booking_agent:
    name: "Бронирование"
    prompt: prompts/booking.txt
    temperature: 0.4
    max_tokens: 120
    color: "#2196F3"

  info_agent:
    name: "Справочная информация"
    prompt: prompts/info.txt
    temperature: 0.5
    max_tokens: 100
    color: "#4CAF50"

  complaint_agent:
    name: "Жалобы и проблемы"
    prompt: prompts/complaint.txt
    temperature: 0.6
    max_tokens: 150
    color: "#F44336"

routing:
  sticky: true
  fallback: info_agent
